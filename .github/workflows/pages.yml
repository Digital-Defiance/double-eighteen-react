name: Deploy demo to Pages

# Builds the live demo/harness (the dev/ app) and deploys it to GitHub Pages.
# Enable Pages for this repo (Settings → Pages → Source: GitHub Actions).
# If your Pages URL is a project site (https://<owner>.github.io/<repo>/),
# DEMO_BASE must be "/<repo>/" (default below assumes the repo name).

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Build demo
        run: yarn demo:build
        env:
          DEMO_BASE: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
