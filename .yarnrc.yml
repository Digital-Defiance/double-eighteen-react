# `double-eighteen` and `double-eighteen-react` are sibling packages released
# together. Yarn 4's supply-chain age gate (`npmMinimalAgeGate`, default 1 day)
# would otherwise refuse a freshly published `double-eighteen` for 24h, blocking
# this repo's CI/dev installs immediately after a release. Preapprove our own
# core package so it installs right away; the age gate still protects every
# third-party dependency.
npmPreapprovedPackages:
  - "double-eighteen"
